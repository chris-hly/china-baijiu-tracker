<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泸州老窖 - A股白酒行业</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .company-detail { max-width: 900px; margin: 0 auto; padding: 20px; }
        .company-header { border-bottom: 2px solid #cd7f32; padding-bottom: 25px; margin-bottom: 30px; display: flex; align-items: center; gap: 20px; }
        .company-logo { font-size: 4rem; }
        .company-info h1 { font-size: 2rem; margin-bottom: 5px; }
        .company-code { color: #888; font-size: 1rem; }
        .price-display { margin-top: 15px; display: flex; align-items: baseline; gap: 15px; }
        .current-price { font-size: 2.5rem; color: #cd7f32; font-weight: 700; }
        .price-change { font-size: 1.2rem; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #cd7f32; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .metric-card { background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 10px; text-align: center; }
        .metric-card .label { color: #888; font-size: 0.85rem; }
        .metric-card .value { color: #e0e0e0; font-size: 1.5rem; font-weight: 700; margin-top: 5px; }
        .section { margin: 30px 0; }
        .section h2 { color: #cd7f32; margin-bottom: 15px; font-size: 1.2rem; }
        .section p { color: #ccc; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-detail">
            <a href="../index.html" class="back-link">← 返回首页</a>
            <div class="company-header">
                <div class="company-logo">🏺</div>
                <div class="company-info">
                    <h1>泸州老窖</h1>
                    <div class="company-code">000568.SZ | 深交所</div>
                    <div class="price-display">
                        <span class="current-price">¥198.50</span>
                        <span class="price-change" style="color: #ff6b6b;">-0.45%</span>
                    </div>
                </div>
            </div>
            <div class="metrics-grid">
                <div class="metric-card"><div class="label">总市值</div><div class="value">2920亿</div></div>
                <div class="metric-card"><div class="label">PE(TTM)</div><div class="value">26.8x</div></div>
                <div class="metric-card"><div class="label">毛利率</div><div class="value">88.2%</div></div>
                <div class="metric-card"><div class="label">ROE</div><div class="value">35.2%</div></div>
            </div>
            <div class="section">
                <h2>公司简介</h2>
                <p>泸州老窖是中国四大名酒之一，以"国窖1573"为代表的高端白酒品牌。公司位于四川省泸州市，拥有连续使用至今的明代酿酒窖池群，是中国白酒行业的重要文化遗产。</p>
                <p>国窖1573是公司核心高端产品，与茅台、五粮液并称"茅五泸"，是高端白酒三强之一。</p>
            </div>
            <p style="color: #888; font-size: 0.85rem; margin-top: 30px;">* 详细分析页建设中...</p>
        </div>
    </div>
</body>
</html>
